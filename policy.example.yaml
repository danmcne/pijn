# pijn node policy — see SPEC.md §4 for the full schema.
# Data lives under ~/.pijn/<npub>/ (relay db, blobs, state), so reinstalling the
# code never touches it. Override the root with the PIJN_HOME env var.
version: 1

identity:
  # The nsec is stored ENCRYPTED at ~/.pijn/<npub>/nsec.enc and unlocked with a
  # passphrase when a signing command needs it (or via PIJN_PASSPHRASE for
  # automation; or bypass entirely with a plaintext PIJN_NSEC). `npub` here is
  # optional — it pins which identity this node uses; otherwise ~/.pijn/active.
  npub: ""

services:
  # Omit `db`/`path` to use the defaults under ~/.pijn/<npub>/. Set them only to
  # override the location.
  event_store: { enabled: true, listen: "127.0.0.1:4848" }
  blob_store:  { enabled: true, listen: "127.0.0.1:4849" }
  gateway:     { enabled: true, listen: "127.0.0.1:4850" }

relays:
  # Your own relay first, then a few reliable public ones so discovery/announce
  # reach the wider network. Trim or replace to taste.
  read:
    - "ws://127.0.0.1:4848"
    - "wss://relay.damus.io"
    - "wss://nos.lol"
    - "wss://relay.primal.net"
    - "wss://relay.nostr.band"
  write:
    - "ws://127.0.0.1:4848"
    - "wss://relay.damus.io"
    - "wss://nos.lol"
  # Seeds the web of trust (SPEC §7): the follow-graphs and NIP-05 vouches stored
  # on these relays prime name ranking / anti-impersonation. Inert until P6.
  trusted: []

blossom:
  servers: ["http://127.0.0.1:4849"]

# ---- consumed by later phases (parsed but inert in P1) ----
transport:
  default: direct
  tor: { socks: "127.0.0.1:9050", inbound_onion: false }

# Conservative ceilings to start (raise as you choose to host more).
limits: { storage_total: 2GB, bandwidth_day: 1GB, bandwidth_month: 10GB, blob_max_size: 100MB }

# How to make room when storage_total is hit. Default 'manual' = never auto-evict
# (you chose what to mirror, so you prune). Other policies: lru | popularity.
eviction: { policy: manual, protect_pinned: true }

moderation:
  mode: opt-in
  pubkeys: { allow: [], block: [] }
  content: { allow: [], block: [] }
  warn_on_override: true

# Sites this node mirrors (P3). `pijn sync` pulls these now; `pijn run` keeps
# them refreshed. Set `relays.read` to a relay that carries the author's events.
sites: []
  # - name: a-friends-blog
  #   pubkey: npub1...          # author identity (npub or hex)
  #   identifier: blog          # "" = their root site; else a named site
  #   seed: true                # advertise to others (announcement: later)
  #   pin: true                 # never evicted; ignore caps
  #   storage_cap: 2GB          # if not pinned: keep a subset up to this, evict rest
  #   refresh: 15m              # how often to re-pull for updates
