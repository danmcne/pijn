# pijn node policy — see SPEC.md §4 for the full schema.
# P1 reads: identity, services, relays, blossom.
# The rest (transport, limits, eviction, moderation, sites) is parsed and kept
# for later phases (P3 replication, P4 transport) — present here so a complete
# file loads cleanly today.
version: 1

identity:
  # The nsec is NEVER stored here. `pijn keygen` writes it to nsec_file (chmod
  # 600); or set PIJN_NSEC in the environment. npub is informational.
  npub: ""
  nsec_file: ./.pijn/nsec

services:
  event_store: { enabled: true, listen: "127.0.0.1:4848", db: "./relay.sqlite" }
  blob_store:  { enabled: true, listen: "127.0.0.1:4849", path: "./blobs" }
  gateway:     { enabled: true, listen: "127.0.0.1:4850" }

relays:
  read:  ["ws://127.0.0.1:4848"]
  write: ["ws://127.0.0.1:4848"]
  # Seeds the web of trust (SPEC §7): the follow-graphs and NIP-05 vouches stored
  # on these relays prime name ranking / anti-impersonation. Inert until P6.
  trusted: []

blossom:
  servers: ["http://127.0.0.1:4849"]

# ---- consumed by later phases (parsed but inert in P1) ----
transport:
  default: direct
  tor: { socks: "127.0.0.1:9050", inbound_onion: false }

limits: { storage_total: 20GB, bandwidth_month: 200GB, blob_max_size: 100MB }

eviction: { policy: lru, protect_pinned: true }

moderation:
  mode: opt-in
  pubkeys: { allow: [], block: [] }
  content: { allow: [], block: [] }
  warn_on_override: true

# Sites this node mirrors (P3). `pijn sync` pulls these now; `pijn run` keeps
# them refreshed. Set `relays.read` to a relay that carries the author's events.
sites: []
  # - name: a-friends-blog
  #   pubkey: npub1...          # author identity (npub or hex)
  #   identifier: blog          # "" = their root site; else a named site
  #   seed: true                # advertise to others (announcement: later)
  #   pin: true                 # never evicted; ignore caps
  #   storage_cap: 2GB          # if not pinned: keep a subset up to this, evict rest
  #   refresh: 15m              # how often to re-pull for updates
